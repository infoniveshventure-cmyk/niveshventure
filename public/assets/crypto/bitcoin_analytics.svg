<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="100%" height="100%">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.95"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="1" y="1" width="318" height="198" rx="16" fill="url(#cardGrad)" stroke="rgba(255, 255, 255, 0.12)" stroke-width="1.5"/>
  
  <!-- Header -->
  <path d="M 28 36 L 28 20 C 28 17.8 29.8 16 32 16 L 44 16 C 46.2 16 48 17.8 48 20 L 48 36 Z" fill="#F7931A" opacity="0.15"/>
  <text x="24" y="36" fill="#F7931A" font-family="'Inter', sans-serif" font-size="11" font-weight="600" letter-spacing="1">BITCOIN ANALYTICS</text>
  
  <!-- Content -->
  <text x="24" y="72" fill="#FFFFFF" font-family="'Space Grotesk', sans-serif" font-size="28" font-weight="700">$98,400</text>
  <text x="160" y="65" fill="#00FFA3" font-family="'Inter', sans-serif" font-size="11" font-weight="600">↑ +4.2% (24h)</text>
  
  <!-- Candlesticks graph -->
  <g transform="translate(24, 110)">
    <!-- Candlestick 1 -->
    <line x1="20" y1="10" x2="20" y2="70" stroke="#00FFA3" stroke-width="1.5"/>
    <rect x="15" y="25" width="10" height="30" fill="#00FFA3" rx="1"/>

    <!-- Candlestick 2 -->
    <line x1="60" y1="20" x2="60" y2="80" stroke="#FF3CAC" stroke-width="1.5"/>
    <rect x="55" y="30" width="10" height="35" fill="#FF3CAC" rx="1"/>

    <!-- Candlestick 3 -->
    <line x1="100" y1="5" x2="100" y2="55" stroke="#00FFA3" stroke-width="1.5"/>
    <rect x="95" y="15" width="10" height="25" fill="#00FFA3" rx="1"/>

    <!-- Candlestick 4 -->
    <line x1="140" y1="15" x2="140" y2="65" stroke="#00FFA3" stroke-width="1.5"/>
    <rect x="135" y="20" width="10" height="20" fill="#00FFA3" rx="1"/>

    <!-- Candlestick 5 -->
    <line x1="180" y1="5" x2="180" y2="45" stroke="#00FFA3" stroke-width="1.5"/>
    <rect x="175" y="10" width="10" height="20" fill="#00FFA3" rx="1"/>
  </g>

  <!-- Large BTC watermarked symbol in background -->
  <path d="M 265 140 C 275 140 282 133 282 124 C 282 118 278 113 272 111 C 278 109 281 104 281 99 C 281 91 274 85 264 85 L 245 85 L 245 140 L 265 140 Z M 255 93 L 263 93 C 267 93 270 95 270 98 C 270 101 267 103 263 103 L 255 103 L 255 93 Z M 255 111 L 264 111 C 269 111 272 113 272 117 C 272 121 269 123 264 123 L 255 123 L 255 111 Z" fill="rgba(247, 147, 26, 0.1)" stroke="rgba(247, 147, 26, 0.15)" stroke-width="2" transform="scale(1.2) translate(-40, -10)"/>
</svg>
