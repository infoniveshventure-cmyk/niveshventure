<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="100%" height="100%">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="ethGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7B5CFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0.0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="1" y="1" width="318" height="198" rx="16" fill="url(#cardGrad)" stroke="rgba(255, 255, 255, 0.12)" stroke-width="1.5"/>
  
  <!-- Header -->
  <text x="24" y="36" fill="#8C8C8C" font-family="'Inter', sans-serif" font-size="11" font-weight="600" letter-spacing="1">ETHEREUM PORTFOLIO</text>
  
  <!-- Content -->
  <text x="24" y="72" fill="#FFFFFF" font-family="'Space Grotesk', sans-serif" font-size="28" font-weight="700">14.82 ETH</text>
  <text x="24" y="90" fill="#94A3B8" font-family="'Inter', sans-serif" font-size="11">Equivalent to ~$38,500.00</text>
  
  <!-- Ethereum illustration in center-right -->
  <g transform="translate(230, 95)">
    <!-- ETH Logo vector -->
    <path d="M 0 -45 L -25 -5 L 0 10 L 25 -5 Z M 0 -45 L 0 10 M -25 -5 L 0 -18 L 25 -5 Z" fill="url(#ethGlow)" stroke="#7B5CFF" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M -25 3 L 0 40 L 25 3 Z M 0 3 L 0 40" fill="none" stroke="#00E5FF" stroke-width="1" stroke-linejoin="round" opacity="0.6"/>
  </g>

  <!-- Miniature bar charts at bottom left -->
  <g transform="translate(24, 130)">
    <rect x="0" y="15" width="8" height="20" rx="1.5" fill="#7B5CFF"/>
    <rect x="12" y="5" width="8" height="30" rx="1.5" fill="#7B5CFF"/>
    <rect x="24" y="10" width="8" height="25" rx="1.5" fill="#00E5FF"/>
    <rect x="36" y="20" width="8" height="15" rx="1.5" fill="#64748B"/>
    <rect x="48" y="0" width="8" height="35" rx="1.5" fill="#00FFA3"/>
    <text x="64" y="28" fill="#00FFA3" font-family="'Inter', sans-serif" font-size="10" font-weight="600">Growth Yield Active</text>
  </g>
</svg>
