<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="100%" height="100%">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.95"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="1" y="1" width="318" height="198" rx="16" fill="url(#cardGrad)" stroke="rgba(255, 255, 255, 0.12)" stroke-width="1.5"/>
  
  <!-- Header -->
  <text x="24" y="36" fill="#94A3B8" font-family="'Inter', sans-serif" font-size="11" font-weight="600" letter-spacing="1">REFERRAL NETWORK</text>
  
  <!-- Stats -->
  <text x="24" y="68" fill="#FFFFFF" font-family="'Space Grotesk', sans-serif" font-size="26" font-weight="700">1,248</text>
  <text x="24" y="84" fill="#00E5FF" font-family="'Inter', sans-serif" font-size="11" font-weight="600">Active Downline Nodes</text>

  <!-- Visual Mini Referral Node Tree Illustration -->
  <g transform="translate(195, 110)">
    <!-- Nodes Connector Lines -->
    <path d="M 50 15 L 20 50 M 50 15 L 80 50 M 20 50 L 5 80 M 20 50 L 35 80" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    
    <!-- Parent node -->
    <circle cx="50" cy="15" r="10" fill="#7B5CFF"/>
    
    <!-- Child Left -->
    <circle cx="20" cy="50" r="8" fill="#00E5FF"/>
    <!-- Child Right -->
    <circle cx="80" cy="50" r="8" fill="#FF3CAC"/>
    
    <!-- Grandchildren Left -->
    <circle cx="5" cy="80" r="5" fill="#00FFA3"/>
    <circle cx="35" cy="80" r="5" fill="#64748B"/>
  </g>
  
  <!-- Bottom info -->
  <g transform="translate(24, 120)">
    <text x="0" y="0" fill="#FFFFFF" font-family="'Inter', sans-serif" font-size="11" font-weight="600">Left Side: 640</text>
    <text x="0" y="16" fill="#FFFFFF" font-family="'Inter', sans-serif" font-size="11" font-weight="600">Right Side: 608</text>
    <text x="0" y="38" fill="#94A3B8" font-family="'Inter', sans-serif" font-size="10">Strong Leg Matching Active</text>
  </g>
</svg>
